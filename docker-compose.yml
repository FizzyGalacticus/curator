services:
  curator:
    build: .
    image: curator:latest
    container_name: curator
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./downloads:/app/downloads
    restart: unless-stopped
    environment:
      - TZ=America/Los_Angeles
      - CURATOR_DATA_DIR=/app/data
      - CURATOR_DOWNLOAD_DIR=/app/downloads
      - CURATOR_PORT=8080
    healthcheck:
      test: ["CMD", "/curator", "-health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
